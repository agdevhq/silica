name: Require Changeset

on:
  pull_request:
    branches:
      - main

jobs:
  require-changeset:
    name: Require Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin main:main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check for changeset
        run: |
          if npx changeset status --since=main; then
            exit 0
          fi

          if git diff --name-only main...HEAD -- '.changeset/*.md' | grep -qE '^\.changeset/.+\.md$'; then
            echo "Changeset status failed, but an explicit changeset file is present."
            echo "This allows intentional empty/bootstrap changesets."
            exit 0
          fi

          exit 1
