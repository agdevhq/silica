name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Validate Release Readiness
        run: npm run release:check

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Satisfy required checks on Version Packages PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number="${{ steps.changesets.outputs.pullRequestNumber }}"
          head_sha="$(gh pr view "$pr_number" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)"

          for check_name in "Build, Lint & Test" "Require Changeset"; do
            gh api --method POST "repos/${{ github.repository }}/statuses/${head_sha}" \
              -f "state=success" \
              -f "context=${check_name}" \
              -f "description=Skipped for Version Packages PR"
          done
