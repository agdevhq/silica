name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    if: github.event_name != 'pull_request' || github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Cache Turbo
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Validate Release Readiness
        run: npm run release:check

  ci-version-packages:
    name: Build, Lint & Test
    if: github.event_name == 'pull_request' && github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - name: Skip CI for Version Packages PR
        run: echo "Version Packages PR — validated on feature PRs and main CI; Release runs after CI passes on main."
