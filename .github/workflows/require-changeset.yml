name: Require Changeset

on:
  pull_request:
    branches:
      - main

jobs:
  require-changeset:
    name: Require Changeset
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fetch main branch
        run: git fetch origin main:main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Add Dependabot changeset
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        env:
          BASE_REF: main
        run: node scripts/dependabot-changeset.mjs

      - name: Commit Dependabot changeset
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        env:
          DEPENDABOT_CHANGESET_DEPLOY_KEY: ${{ secrets.DEPENDABOT_CHANGESET_DEPLOY_KEY }}
        run: |
          if [ -z "$(git status --porcelain .changeset)" ]; then
            echo "No changeset changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git commit -m "Add changeset for Dependabot dependency updates"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPENDABOT_CHANGESET_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git push "git@github.com:${{ github.repository }}.git" "HEAD:${{ github.head_ref }}"

      - name: Skip changeset check
        if: contains(github.event.pull_request.labels.*.name, 'skip-changeset')
        run: echo "PR labeled skip-changeset — no package version bump expected."

      - name: Check for changeset
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
        run: npx changeset status --since=main

  require-changeset-version-packages:
    name: Require Changeset
    if: github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - name: Skip changeset check for Version Packages PR
        run: echo "Version Packages PR — changesets are consumed, not added."
