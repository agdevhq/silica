[build]
command = "SILICA_SITE_URL=${URL:-$DEPLOY_PRIME_URL} npx turbo run build --filter=docs"
publish = "docs/.silica/next/.next"

[build.environment]
NODE_VERSION = "22"
SILICA_PROJECT_ROOT = "docs"

[context.deploy-preview.environment]
SILICA_PROJECT_ROOT = "docs"
SILICA_CACHE_DIR = "/tmp/silica-cache"

[context.production.environment]
SILICA_PROJECT_ROOT = "docs"
SILICA_CACHE_DIR = "/tmp/silica-cache"

[[plugins]]
package = "@netlify/plugin-nextjs"
