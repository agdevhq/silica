name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Detect pending changesets
        id: changesets_state
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Turbo
        if: steps.changesets_state.outputs.publish == 'true'
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.event.workflow_run.head_sha || github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build Packages
        if: steps.changesets_state.outputs.publish == 'true'
        run: npm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Satisfy required checks on Version Packages PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          head_sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/changeset-release/main" --jq .object.sha)"

          for check_name in "Build, Lint & Test" "Require Changeset"; do
            gh api --method POST "repos/${{ github.repository }}/statuses/${head_sha}" \
              -f "state=success" \
              -f "context=${check_name}" \
              -f "description=Skipped for Version Packages PR"
          done
